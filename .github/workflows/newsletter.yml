name: Update Newsletter Data

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 AM UTC daily
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write           # Allow committing newsletter_data.js back to repo

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run newsletter crawler
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 fetch_newsletters.py

      - name: Commit updated newsletter data
        run: |
          git config user.name  "Newsletter Bot"
          git config user.email "actions@github.com"
          git add newsletter_data.js
          git diff --staged --quiet || git commit -m "chore: update newsletter data $(date -u '+%Y-%m-%d') [skip ci]"
          git push
